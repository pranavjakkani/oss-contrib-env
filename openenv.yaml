spec_version: 1
name: oss_contrib_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
version: "0.1.0"
description: >
  An offline OpenEnv benchmark where an LLM agent learns to contribute to
  real open-source projects by replaying cached GitHub history from
  huggingface/datasets across issue triage, duplicate detection, and patch
  localization tasks.

tasks:
  - id: triage
    description: "Given 5 issues and a contributor profile, pick the best issue to work on"
    difficulty: easy
    max_steps: 5
    reward_range: [-0.2, 1.0]

  - id: duplicate
    description: "Given a new issue and candidate prior issues, return duplicate issue IDs"
    difficulty: medium
    max_steps: 7
    reward_range: [-0.2, 1.0]

  - id: patch_loc
    description: "Given a bug report, return a ranked list of likely file paths to edit"
    difficulty: hard
    max_steps: 7
    reward_range: [-0.2, 1.0]

api:
  reset: /reset
  step: /step
  state: /state
